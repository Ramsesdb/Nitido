locked_decisions:
  - "Bundle as one change with three sub-deltas (multi-image, categorization fallback, pre-fresh auto-adjust)"
  - "Multi-image: serial loop (Approach A), max 10 images per session"
  - "Pre-fresh: auto-adjust trackedSince at import time, with RetroactivePreviewDialog confirmation (NOT silent)"
  - "Categorization fallback: hardcoded C19 (expense) / C03 (income) constants + LLM prompt update; defense in depth"
  - "Multi-image dedupe: in-session by (amount, currency, date±4h, counterpartyName)"
  - "Failure isolation: N-of-M image failures continue with the rest, report in review screen"
  - "Reuse existing infra from account-pre-tracking-period (no new Drift migration; rides on v24)"
  - "Image cap = 10 fixed (not user-configurable in v1); PDF rasterization counts each page against the cap"
  - "Pivot date per image: EXIF auto-detect first, prompt user only for images missing EXIF; user may override any pivot"
  - "Confidence threshold: pass-through (spec describes behavior; design phase picks numeric value)"
  - "RetroactivePreviewDialog/RetroactiveStrongConfirmDialog lifted to lib/core/presentation/widgets/retroactive_preview_dialog.dart"
  - "Strong-confirm trigger reused from account-pre-tracking-period: shift > 50% OR projected balance < 0"
  - "Confidence threshold _kMinConfidence = 0.55 (top-level const in auto_categorization_service.dart); below threshold → discard suggestion → fallback fires"
  - "EXIF: reuse package:exif ^3.3.0 already in pubspec; new ImagePivot value class in lib/core/services/statement_import/image_pivot.dart"
  - "Dedupe key tuple: (amount.abs, currency.upper, dateBucket=floor(ms/4h), counterpartyName.lowerTrim); applied AFTER all extractions, BEFORE MatchingEngine"
  - "Fallback category lookup must accept type 'B' for expense queries (C19 has type 'B' in seed)"
  - "Feature flags in lib/core/constants/feature_flags.dart (NEW file): kEnableMultiImageImport=false, kEnablePreFreshAutoAdjust=true; categorization fallback has NO flag"
  - "PR ordering: this change merges AFTER account-pre-tracking-period archives (lift of retroactive dialogs touches its already-shipped code)"
out_of_scope:
  - telemetry
  - batched-LLM call (single request with N images)
  - dedicated per-bank parsers
  - transfer detection in extracted rows
  - Firebase sync of trackedSince
next_recommended: sdd-apply
