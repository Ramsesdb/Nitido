<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Nitido · Editar perfil — mockup</title>
<!--
  Nitido · Editar perfil bottom sheet — redesign mockup
  ---------------------------------------------------------------
  Decisiones clave (ver Flutter port):
  · Selección unificada: la foto subida ocupa el tile #1 ("Tu foto"),
    por eso el avatar hero arriba refleja exactamente lo elegido en el grid.
  · El tile de "Subir foto" se mueve al final (#12, dashed) → 4×3 sin huérfanos.
  · Halo en lugar de borde grueso teal: ring suave de superficie + acento sutil.
  · Footer: 2 acciones, mismo alto, mismo eje. Mint se reserva para Guardar + ring.
  · Tokens definidos como CSS vars → mapear 1:1 a NitidoAiTokens.
-->
<style>
  /* ──────────────────────────────────────────────────────────────
    Nitido tokens (dark) — espejo del NitidoAiTokens en Flutter
     ────────────────────────────────────────────────────────────── */
  :root {
    /* Surfaces — slight green-tint near-black, escalonadas */
    --bg-scrim:                rgba(0, 0, 0, 0.62);
    --bg-app:                  #06090A;     /* fondo de la pantalla detrás del scrim */
    --bg-sheet:                #0E1413;     /* surface del bottom sheet (tinted) */
    --surface-container:       #161D1C;     /* tile bg, input wells */
    --surface-container-high:  #1E2625;     /* hover / selected base */

    /* Borders & dividers */
    --border-subtle:           rgba(255, 255, 255, 0.06);
    --border-hairline:         rgba(255, 255, 255, 0.09);
    --border-dashed:           rgba(255, 255, 255, 0.18);

    /* Text */
    --text-primary:            #ECF1EF;
    --text-secondary:          #9AA5A2;
    --text-tertiary:           #5F6B68;

    /* Accent — teal/mint (mismo del chat module) */
    --accent-primary:          #4FD1B5;
    --accent-primary-soft:     rgba(79, 209, 181, 0.16);
    --accent-primary-faint:    rgba(79, 209, 181, 0.10);
    --accent-on:               #06241E;

    /* Avatar tile palettes — variaciones suaves del surface-container,
       NO los verdes oscuros saturados del diseño original */
    --tile-tint-1:  #1A2120;
    --tile-tint-2:  #1B201F;
    --tile-tint-3:  #181F1E;
    --tile-tint-4:  #1C2222;

    /* Typography */
    --font-sans:    "Inter", ui-sans-serif, system-ui, -apple-system, "Segoe UI",
                    Roboto, "Helvetica Neue", Arial, sans-serif;
    --font-display: ui-rounded, "SF Pro Rounded", "Inter", system-ui, sans-serif;
    --font-mono:    ui-monospace, "SF Mono", "JetBrains Mono", Menlo, Consolas,
                    monospace;

    /* Radii */
    --r-sheet:      28px;
    --r-surface:    16px;
    --r-pill:       999px;

    /* Elevación */
    --shadow-sheet: 0 -24px 60px rgba(0, 0, 0, 0.55),
                    0 -2px 0 rgba(255, 255, 255, 0.04) inset;
    --shadow-tile-selected:
                    0 0 0 2px var(--accent-primary),
                    0 0 0 6px var(--accent-primary-faint);
    --shadow-hero-halo:
                    0 0 0 1px rgba(255, 255, 255, 0.05),
                    0 0 0 8px rgba(255, 255, 255, 0.025),
                    0 18px 40px rgba(0, 0, 0, 0.5);
  }

  *,
  *::before,
  *::after { box-sizing: border-box; }

  html, body {
    margin: 0;
    padding: 0;
    font-family: var(--font-sans);
    color: var(--text-primary);
    background: var(--bg-app);
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    text-rendering: optimizeLegibility;
  }

  /* ──────────────────────────────────────────────────────────────
     Stage — phone-sized viewport mock con scrim
     ────────────────────────────────────────────────────────────── */
  .stage {
    min-height: 100vh;
    min-height: 100dvh;
    display: flex;
    align-items: flex-end;
    justify-content: center;
    padding: 24px 16px;
    background:
      radial-gradient(120% 60% at 50% 0%,
        rgba(79, 209, 181, 0.05) 0%,
        rgba(0, 0, 0, 0) 60%),
      var(--bg-app);
  }

  .phone {
    position: relative;
    width: 100%;
    max-width: 420px;
    height: min(92vh, 820px);
    display: flex;
    align-items: flex-end;
    justify-content: center;
    border-radius: 36px;
    overflow: hidden;
    background: linear-gradient(180deg, #0A0F0E 0%, #050807 100%);
    box-shadow:
      0 30px 80px rgba(0, 0, 0, 0.6),
      0 0 0 1px rgba(255, 255, 255, 0.04);
  }

  /* Faint app shell behind the sheet — sugerencia de pantalla previa */
  .phone::before {
    content: "";
    position: absolute;
    inset: 0;
    background:
      radial-gradient(60% 35% at 50% 18%, rgba(79, 209, 181, 0.05), transparent 70%),
      linear-gradient(180deg, transparent 0%, transparent 38%, rgba(0, 0, 0, 0.55) 100%);
    pointer-events: none;
  }

  .phone::after {
    content: "";
    position: absolute;
    inset: 0;
    background: var(--bg-scrim);
    pointer-events: none;
  }

  /* ──────────────────────────────────────────────────────────────
     Bottom sheet
     ────────────────────────────────────────────────────────────── */
  .sheet {
    position: relative;
    z-index: 2;
    width: 100%;
    background: var(--bg-sheet);
    border-radius: var(--r-sheet) var(--r-sheet) 0 0;
    box-shadow: var(--shadow-sheet);
    display: flex;
    flex-direction: column;
    overflow: hidden;
    /* Hint de luz superior — translatable a un BorderSide subtle en Flutter */
    border-top: 1px solid rgba(255, 255, 255, 0.04);
  }

  /* Drag handle */
  .sheet__handle {
    width: 36px;
    height: 4px;
    border-radius: var(--r-pill);
    background: rgba(255, 255, 255, 0.14);
    margin: 10px auto 4px;
  }

  /* Header */
  .sheet__header {
    display: flex;
    align-items: center;
    padding: 14px 22px 14px;
  }

  .sheet__title {
    font-family: var(--font-display);
    font-size: 19px;
    font-weight: 600;
    letter-spacing: -0.01em;
    color: var(--text-primary);
    margin: 0;
  }

  .sheet__divider {
    height: 1px;
    background: var(--border-subtle);
    margin: 0 22px;
  }

  /* Scroll area */
  .sheet__body {
    padding: 24px 22px 12px;
    display: flex;
    flex-direction: column;
    gap: 28px;
    overflow-y: auto;
  }

  /* ──────────────────────────────────────────────────────────────
     Hero block — avatar + name inline
     ────────────────────────────────────────────────────────────── */
  .hero {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 22px;
    padding-top: 4px;
  }

  .hero__avatar {
    position: relative;
    width: 140px;
    height: 140px;
    border-radius: 50%;
    overflow: hidden;
    box-shadow: var(--shadow-hero-halo);
    background: var(--surface-container-high);
  }

  .hero__avatar svg {
    width: 100%;
    height: 100%;
    display: block;
  }

  /* Sutil indicador de "estás editando esto" — anillo acento muy ligero */
  .hero__avatar::after {
    content: "";
    position: absolute;
    inset: -1px;
    border-radius: 50%;
    border: 1px solid rgba(79, 209, 181, 0.22);
    pointer-events: none;
  }

  /* Name field — inline, underline-on-focus */
  .name-field {
    width: 100%;
    display: flex;
    flex-direction: column;
    align-items: stretch;
    gap: 6px;
  }

  .name-field__row {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    padding: 6px 0 8px;
    border-bottom: 1.5px solid var(--accent-primary);
    /* En reposo sería var(--border-hairline). Mockup → focused. */
  }

  .name-field__input {
    appearance: none;
    border: 0;
    outline: 0;
    background: transparent;
    font-family: var(--font-display);
    font-size: 23px;
    font-weight: 600;
    letter-spacing: -0.01em;
    color: var(--text-primary);
    text-align: center;
    width: auto;
    min-width: 0;
    padding: 0;
    caret-color: var(--accent-primary);
  }

  .name-field__input::placeholder { color: var(--text-tertiary); }

  .name-field__pencil {
    flex: none;
    color: var(--text-tertiary);
    display: inline-flex;
    align-items: center;
  }

  .name-field__meta {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 0 2px;
  }

  .name-field__hint {
    font-size: 11.5px;
    color: var(--text-tertiary);
    letter-spacing: 0.01em;
  }

  .name-field__counter {
    font-family: var(--font-mono);
    font-feature-settings: "tnum" 1;
    font-variant-numeric: tabular-nums;
    font-size: 11.5px;
    color: var(--text-tertiary);
    letter-spacing: 0.02em;
  }

  /* ──────────────────────────────────────────────────────────────
     Avatar picker — 4×3 grid
     ────────────────────────────────────────────────────────────── */
  .picker {
    display: flex;
    flex-direction: column;
    gap: 14px;
  }

  .picker__heading {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
  }

  .picker__heading-label {
    font-size: 11.5px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: var(--text-secondary);
  }

  .picker__heading-aside {
    font-size: 11.5px;
    color: var(--text-tertiary);
    font-variant-numeric: tabular-nums;
  }

  .grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 16px 14px;
  }

  /* Tile */
  .tile {
    position: relative;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
  }

  .tile__circle {
    position: relative;
    width: 100%;
    aspect-ratio: 1 / 1;
    border-radius: 50%;
    background: var(--surface-container);
    overflow: hidden;
    transition: transform 140ms ease, box-shadow 160ms ease, background 160ms ease;
  }

  .tile__circle svg {
    width: 100%;
    height: 100%;
    display: block;
  }

  .tile:hover .tile__circle {
    background: var(--surface-container-high);
    transform: translateY(-1px);
  }

  .tile:active .tile__circle { transform: translateY(0) scale(0.98); }

  /* Selected state */
  .tile--selected .tile__circle {
    box-shadow: var(--shadow-tile-selected);
  }

  .tile--selected .tile__check {
    opacity: 1;
    transform: scale(1);
  }

  .tile__check {
    position: absolute;
    right: -2px;
    bottom: -2px;
    width: 22px;
    height: 22px;
    border-radius: 50%;
    background: var(--accent-primary);
    color: var(--accent-on);
    display: inline-flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 0 0 3px var(--bg-sheet);
    opacity: 0;
    transform: scale(0.85);
    transition: opacity 140ms ease, transform 140ms ease;
    pointer-events: none;
  }

  .tile__check svg { width: 12px; height: 12px; display: block; }

  .tile__label {
    font-size: 10.5px;
    color: var(--text-tertiary);
    letter-spacing: 0.01em;
    text-align: center;
    line-height: 1.2;
  }

  /* Upload tile (dashed) */
  .tile--upload .tile__circle {
    background: transparent;
    border: 1.5px dashed var(--border-dashed);
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--text-secondary);
  }

  .tile--upload:hover .tile__circle {
    border-color: var(--accent-primary);
    color: var(--accent-primary);
    background: var(--accent-primary-faint);
  }

  .tile--upload .tile__circle svg { width: 36%; height: 36%; }

  /* "Tu foto" mini-label sobre el tile activo subido */
  .tile__pin {
    position: absolute;
    top: 6px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 9px;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--accent-primary);
    background: var(--bg-sheet);
    padding: 2px 7px;
    border-radius: var(--r-pill);
    box-shadow: 0 0 0 1px var(--accent-primary-soft);
    pointer-events: none;
  }

  /* ──────────────────────────────────────────────────────────────
     Footer / action bar
     ────────────────────────────────────────────────────────────── */
  .actions {
    margin-top: 4px;
    padding: 14px 22px calc(14px + env(safe-area-inset-bottom, 0px));
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    border-top: 1px solid var(--border-subtle);
    background: var(--bg-sheet);
  }

  .btn {
    appearance: none;
    border: 0;
    cursor: pointer;
    height: 48px;
    border-radius: var(--r-pill);
    font-family: var(--font-sans);
    font-size: 14.5px;
    font-weight: 600;
    letter-spacing: 0.005em;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    padding: 0 22px;
    transition: background 140ms ease, color 140ms ease, transform 140ms ease;
    -webkit-tap-highlight-color: transparent;
  }

  .btn--ghost {
    background: transparent;
    color: var(--text-secondary);
    padding: 0 18px;
  }

  .btn--ghost:hover {
    color: var(--text-primary);
    background: var(--surface-container);
  }

  .btn--primary {
    background: var(--accent-primary);
    color: var(--accent-on);
  }

  .btn--primary:hover { transform: translateY(-1px); }
  .btn--primary:active { transform: translateY(0); }

  .btn--primary svg { width: 16px; height: 16px; }

  /* ──────────────────────────────────────────────────────────────
     Decoración leve detrás del sheet — sugerencia de la app
     ────────────────────────────────────────────────────────────── */
  .ghost-screen {
    position: absolute;
    top: 28px;
    left: 0;
    right: 0;
    text-align: center;
    color: rgba(255, 255, 255, 0.18);
    font-family: var(--font-display);
    font-size: 13px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    z-index: 1;
  }

  /* ──────────────────────────────────────────────────────────────
     Reduced motion
     ────────────────────────────────────────────────────────────── */
  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after {
      transition-duration: 0ms !important;
      animation-duration: 0ms !important;
    }
  }
</style>
</head>

<main class="stage" role="main">
  <div class="phone" aria-hidden="false">

    <!-- Faint hint de la pantalla detrás (Ajustes / Perfil) -->
    <div class="ghost-screen">Ajustes · Perfil</div>

    <section class="sheet" role="dialog" aria-modal="true"
             aria-labelledby="sheet-title">

      <div class="sheet__handle" aria-hidden="true"></div>

      <header class="sheet__header">
        <h2 id="sheet-title" class="sheet__title">Editar perfil</h2>
      </header>

      <div class="sheet__divider" aria-hidden="true"></div>

      <div class="sheet__body">

        <!-- ── HERO ────────────────────────────────────────────── -->
        <div class="hero">

          <div class="hero__avatar" aria-label="Avatar actual: tu foto subida">
            <svg aria-hidden="true"><use href="#av-rb"/></svg>
          </div>

          <div class="name-field">
            <div class="name-field__row">
              <input
                class="name-field__input"
                type="text"
                value="Ramses Briceno"
                maxlength="20"
                aria-label="Nombre"
                size="14"
              />
              <span class="name-field__pencil" aria-hidden="true">
                <svg width="14" height="14"><use href="#i-pencil"/></svg>
              </span>
            </div>
